services:
  - type: web
    name: studio-canvas
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run cloud:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_SAAS_MOCK
        value: false
      - key: VITE_LLM_PROXY_URL
        value: /api/llm/chat
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-5.5
      - key: LLM_FAST_MODEL
        value: gpt-5.5
      - key: LLM_DEEP_MODEL
        value: gpt-5.5
